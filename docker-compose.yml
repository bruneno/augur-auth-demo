services:
  mysql:
    image: mysql:8
    container_name: augur-auth-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: augur
      MYSQL_USER: augur
      MYSQL_PASSWORD: augur
    ports:
      - "3308:3306"
    volumes:
      - augur-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  augur-mysql-data:
